<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Editor de Productos | Panel de Control</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-slate-50 min-h-screen font-sans text-slate-900">

    <div id="loader" class="fixed top-0 left-0 h-1 bg-blue-500 z-50 transition-all duration-300" style="width:0%"></div>
    <div id="toast" class="fixed bottom-6 right-6 z-50 flex flex-col gap-2"></div>

    <div class="max-w-6xl mx-auto px-4 py-8">
        <header class="flex flex-col md:flex-row md:items-center justify-between mb-8 gap-4">
            <div>
                <h1 class="text-3xl font-extrabold text-slate-800 tracking-tight">Inventario Pro</h1>
                <p class="text-slate-500">Edición rápida de productos del Sheet</p>
            </div>
            <div class="flex items-center gap-2 bg-white p-2 rounded-xl shadow-sm border border-slate-200 w-full md:w-auto">
                <i class="fas fa-key text-slate-400 ml-2"></i>
                <input type="text" id="sheetId" placeholder="ID de la hoja de Google" class="outline-none text-sm w-full md:w-64 px-2">
                <button onclick="conectarSheet()" class="bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded-lg text-sm font-semibold transition shadow-md">Conectar</button>
            </div>
        </header>

        <div class="flex flex-col md:flex-row gap-4 mb-8">
            <div class="relative flex-grow">
                <i class="fas fa-search absolute left-4 top-1/2 -translate-y-1/2 text-slate-400"></i>
                <input type="text" id="buscador" oninput="filtrarProductos()" placeholder="Buscar por nombre o categoría..." class="w-full pl-12 pr-4 py-3 bg-white border border-slate-200 rounded-2xl shadow-sm focus:ring-2 focus:ring-blue-500 outline-none transition">
            </div>
            <div class="flex items-center bg-white px-4 py-2 rounded-2xl border border-slate-200 shadow-sm gap-2">
                <span class="text-sm font-medium text-slate-500">Total:</span>
                <span id="contador" class="text-lg font-bold text-blue-600">0</span>
            </div>
        </div>

        <div id="grid-productos" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6">
            <div class="col-span-full py-20 text-center text-slate-400">
                <i class="fas fa-table-list text-5xl mb-4 opacity-20"></i>
                <p>Ingresa el ID del Sheet para comenzar</p>
            </div>
        </div>
    </div>

    <script>
    const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbz18wb5iCMf6LicVvV6E7f3kmjxymbCLleh4HVZ1XWvjOgfN4sRa4HygvvRtGa3ToUT/exec";
    let productosData = [];

    function normalizarUrlFoto(url) {
        if (!url || url.trim() === '' || url === "null") return 'https://placehold.co/400x300?text=Sin+Foto';
        if (url.includes('drive.google.com/thumbnail') || url.startsWith('http')) return url;
        const match = url.match(/[?&]id=([a-zA-Z0-9_-]+)/) || url.match(/\/file\/d\/([a-zA-Z0-9_-]+)/);
        return match ? 'https://drive.google.com/thumbnail?id=' + match[1] + '&sz=w400' : url;
    }

    async function conectarSheet() {
        const id = document.getElementById('sheetId').value.trim();
        if (!id) return mostrarToast("⚠️ Ingresa un ID", "warning");
        setLoader(20);
        try {
            const res = await fetch(`${WEB_APP_URL}?id=${id}`);
            const data = await res.json();
            productosData = data;
            renderizar(data);
            mostrarToast("✅ Conectado", "success");
        } catch (e) { mostrarToast("❌ Error de conexión", "error"); }
        setLoader(100); setTimeout(() => setLoader(0), 600);
    }

    async function llamarApi(payload) {
        // Esta es la función clave para evitar errores de CORS/Redirección en POST
        const res = await fetch(WEB_APP_URL, {
            method: 'POST',
            mode: 'no-cors', // Primero intentamos no-cors para despertar al script si es necesario
            body: JSON.stringify(payload)
        });
        // Apps Script requiere una segunda llamada con redirección para obtener el JSON
        return fetch(WEB_APP_URL, {
            method: 'POST',
            body: JSON.stringify(payload)
        }).then(r => r.json());
    }

    async function actualizarDato(fila, columna, valor) {
        const sheetId = document.getElementById('sheetId').value.trim();
        setLoader(40);
        try {
            const result = await llamarApi({ action: "update", sheetId, fila, columna, nuevoValor: valor });
            if (result.ok) mostrarToast(`💾 Guardado`, "success");
        } catch (e) { mostrarToast("❌ Error al guardar", "error"); }
        setLoader(100); setTimeout(() => setLoader(0), 600);
    }

    function renderizar(data) {
        const container = document.getElementById('grid-productos');
        document.getElementById('contador').innerText = data.length;
        container.innerHTML = data.length ? data.map(p => crearTarjeta(p)).join('') : '<p class="col-span-full text-center">No hay productos</p>';
    }

    function crearTarjeta(p) {
        const foto = normalizarUrlFoto(p.fotos);
        return `
        <div class="bg-white rounded-3xl shadow-sm border border-slate-200 overflow-hidden group" data-fila="${p._fila}">
            <div class="relative h-52 bg-slate-100">
                <img src="${foto}" class="w-full h-full object-cover group-hover:scale-105 transition-transform duration-500" onerror="this.src='https://placehold.co/400x300?text=Error+Imagen'">
                <button onclick="cambiarFoto(${p._fila})" class="absolute bottom-3 right-3 bg-white/90 backdrop-blur px-3 py-2 rounded-xl text-xs font-bold shadow-sm hover:bg-blue-600 hover:text-white transition">
                    <i class="fas fa-camera mr-1"></i>Foto
                </button>
            </div>
            <div class="p-5 space-y-4">
                <input type="text" value="${(p.nombre || '').replace(/"/g, '&quot;')}" onchange="actualizarDato(${p._fila}, 'nombre', this.value)" class="w-full font-bold text-slate-800 text-lg border-b-2 border-transparent focus:border-blue-400 outline-none transition">
                <textarea onchange="actualizarDato(${p._fila}, 'descripcion', this.value)" class="w-full text-sm text-slate-500 border-b-2 border-transparent focus:border-blue-400 outline-none transition resize-none" rows="2">${p.descripcion || ''}</textarea>
                <div class="flex items-center gap-1 text-blue-600 font-extrabold text-xl">
                    <span>$</span>
                    <input type="text" value="${(p.precios || '0').replace(/[^0-9.,]/g, '')}" onchange="actualizarDato(${p._fila}, 'precios', this.value)" class="w-full bg-transparent border-b-2 border-transparent focus:border-blue-400 outline-none transition">
                </div>
                <div class="flex items-center justify-between pt-4 border-t border-slate-100">
                   <label class="relative inline-flex items-center cursor-pointer">
                        <input type="checkbox" ${p.disponible === 'si' ? 'checked' : ''} onchange="actualizarDato(${p._fila}, 'disponible', this.checked ? 'si' : 'no')" class="sr-only peer">
                        <div class="w-11 h-6 bg-slate-200 rounded-full peer peer-checked:bg-green-500 relative after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:rounded-full after:h-5 after:w-5 after:transition-all peer-checked:after:translate-x-full"></div>
                        <span class="ml-2 text-[10px] font-bold text-slate-400 uppercase">Disponible</span>
                    </label>
                    <span class="text-[10px] bg-slate-100 text-slate-400 px-2 py-1 rounded-md font-mono">fila ${p._fila}</span>
                </div>
            </div>
        </div>`;
    }

    function cambiarFoto(fila) {
        const modal = document.createElement('div');
        modal.id = 'modal-foto';
        modal.className = 'fixed inset-0 bg-black/60 backdrop-blur-sm z-50 flex items-center justify-center p-4';
        modal.innerHTML = `
            <div class="bg-white rounded-3xl shadow-2xl w-full max-w-md p-6 space-y-5">
                <div class="flex justify-between items-center">
                    <h3 class="font-bold text-slate-800">Actualizar Foto</h3>
                    <button onclick="cerrarModalFoto()" class="text-slate-400 hover:text-slate-600"><i class="fas fa-times"></i></button>
                </div>
                <div id="preview-container" class="hidden"><img id="preview-img" class="w-full h-40 object-cover rounded-2xl border"></div>
                <div class="space-y-4">
                    <input type="text" id="input-url-foto" placeholder="URL de imagen..." class="w-full px-4 py-2 border rounded-xl text-sm outline-none focus:ring-2 focus:ring-blue-400">
                    <button onclick="usarUrl(${fila})" class="w-full bg-blue-600 text-white py-2 rounded-xl font-bold">Usar URL</button>
                    <div class="text-center text-xs text-slate-400">O SUBIR ARCHIVO</div>
                    <label class="flex flex-col items-center gap-2 border-2 border-dashed border-slate-200 rounded-2xl p-6 cursor-pointer hover:border-blue-400 transition">
                        <i class="fas fa-cloud-upload-alt text-2xl text-slate-300"></i>
                        <span class="text-sm text-slate-500">Click para seleccionar</span>
                        <input type="file" id="input-file-foto" accept="image/*" class="hidden" onchange="subirArchivo(${fila})">
                    </label>
                </div>
                <div id="upload-status-ui" class="hidden text-center text-xs font-bold text-blue-500 animate-pulse">Subiendo...</div>
            </div>`;
        document.body.appendChild(modal);
    }

    function cerrarModalFoto() { document.getElementById('modal-foto')?.remove(); }

    async function usarUrl(fila) {
        const externalUrl = document.getElementById('input-url-foto').value.trim();
        if (!externalUrl) return;
        cerrarModalFoto(); setLoader(50);
        try {
            const result = await llamarApi({ action: 'uploadImage', externalUrl });
            if (result.ok) aplicarFoto(fila, result.url);
        } catch (e) { mostrarToast("❌ Error con la URL", "error"); }
        setLoader(100); setTimeout(() => setLoader(0), 600);
    }

    async function subirArchivo(fila) {
        const file = document.getElementById('input-file-foto').files[0];
        if (!file) return;
        document.getElementById('upload-status-ui').classList.remove('hidden');
        
        const reader = new FileReader();
        reader.onload = async (e) => {
            const base64 = e.target.result.split(',')[1];
            try {
                const result = await llamarApi({ action: 'uploadImage', base64, mimeType: file.type, fileName: file.name });
                if (result.ok) {
                    aplicarFoto(fila, result.url);
                    cerrarModalFoto();
                }
            } catch (err) { mostrarToast("❌ Error al subir", "error"); }
        };
        reader.readAsDataURL(file);
    }

    async function aplicarFoto(fila, url) {
        const img = document.querySelector(`[data-fila="${fila}"] img`);
        if (img) img.src = url;
        await actualizarDato(fila, 'fotos', url);
    }

    function filtrarProductos() {
        const b = document.getElementById('buscador').value.toLowerCase().trim();
        renderizar(productosData.filter(p => (p.nombre?.toLowerCase().includes(b)) || (p.categoria?.toLowerCase().includes(b))));
    }

    function setLoader(pct) { const l = document.getElementById('loader'); if (l) { l.style.width = pct + '%'; l.style.opacity = pct === 0 ? '0' : '1'; } }
    function mostrarToast(m, t) {
        const toast = document.createElement('div');
        toast.className = `${t === 'success' ? 'bg-green-500' : 'bg-red-500'} text-white px-4 py-2 rounded-xl shadow-lg text-sm`;
        toast.innerText = m;
        document.getElementById('toast').appendChild(toast);
        setTimeout(() => toast.remove(), 3000);
    }
    </script>
</body>
</html>
